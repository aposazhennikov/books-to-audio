name: CI

on:
  push:
  pull_request:

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan for committed secrets
        run: python scripts/secret_scan.py .

  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Linux GUI/OCR system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            tesseract-ocr \
            tesseract-ocr-rus \
            ffmpeg \
            fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[ocr,gui,llm,audio,dev]"

      - name: Installer smoke test
        run: python install.py --dry-run --no-system-check

      - name: Ruff
        run: python -m ruff check .

      - name: Build package
        run: python -m build

      - name: Verify wheel assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("book_normalizer-*.whl"))
          names = set(ZipFile(wheel).namelist())
          required = {
              "book_normalizer/gui/assets/check.svg",
              "book_normalizer/gui/assets/chevron_down.svg",
              "book_normalizer/gui/assets/chevron_up.svg",
              "book_normalizer/gui/assets/icon.svg",
              "book_normalizer/gui/assets/icon.ico",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"Wheel is missing bundled GUI assets: {missing}")
          PY

      - name: Pytest with coverage
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            export QT_QPA_PLATFORM=offscreen
          fi
          set +e
          python -m pytest -m "not gui_snapshot" --cov=book_normalizer --cov-report=term --cov-report=xml 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            python - <<'PY'
          from pathlib import Path

          log_path = Path("pytest.log")
          text = log_path.read_text(encoding="utf-8", errors="replace") if log_path.exists() else "pytest.log was not written"
          tail = "\n".join(text.splitlines()[-80:])
          escaped = (
              tail.replace("%", "%25")
              .replace("\r", "%0D")
              .replace("\n", "%0A")
          )
          print(f"::error title=Pytest failed::{escaped}")
          PY
          fi
          exit "$status"

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.os }}
          path: pytest.log

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.os }}
          path: coverage.xml
